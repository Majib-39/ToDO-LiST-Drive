<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDO-List-Drive | Super Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #0b0e14; --panel: #161b22; --accent: #58a6ff; --text: #c9d1d9; --border: #30363d; --success: #238636; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 40px 20px; min-height: 100vh; }
        .wrapper { max-width: 900px; margin: 0 auto; }
        
        .brand { text-align: center; margin-bottom: 35px; }
        .brand h1 { font-size: 30px; color: #fff; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .brand p { color: #8b949e; font-size: 14px; margin-top: 5px; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--panel); padding: 18px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-card i { color: var(--accent); margin-bottom: 8px; font-size: 18px; }
        .stat-card h3 { font-size: 20px; color: #fff; }
        .stat-card span { font-size: 10px; color: #8b949e; display: block; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }

        .upload-panel { background: var(--panel); border: 2px dashed var(--border); border-radius: 20px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-panel:hover { border-color: var(--accent); background: rgba(88, 166, 255, 0.05); }
        .upload-panel i { font-size: 35px; color: var(--accent); margin-bottom: 10px; }
        #fileInput { display: none; }

        .note-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 25px; display: flex; flex-direction: column; gap: 10px; }
        .note-panel textarea { background: #0d1117; border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; resize: none; outline: none; height: 100px; border: 1px solid var(--border); }
        .note-panel button { background: var(--success); color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }

        .progress-box { width: 100%; height: 5px; background: #0d1117; border-radius: 10px; margin-top: 15px; display: none; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); transition: 0.4s ease; }

        .explorer-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; color: #8b949e; font-size: 14px; }
        .asset-list { list-style: none; display: grid; grid-template-columns: 1fr; gap: 10px; }
        .asset-item { background: #1c2128; padding: 15px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); transition: 0.2s; }
        .asset-item:hover { background: #22272e; border-color: #444c56; }
        
        .asset-info { display: flex; align-items: center; gap: 15px; flex: 1; overflow: hidden; }
        .asset-info i.fa-file-lines { font-size: 24px; color: #79c0ff; min-width: 45px; text-align: center; }
        .asset-info img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); min-width: 45px; }
        .asset-content { display: flex; flex-direction: column; overflow: hidden; }
        .asset-content span { font-size: 14px; color: #fff; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .asset-content small { font-size: 11px; color: #8b949e; }

        .actions { display: flex; gap: 15px; align-items: center; margin-left: 10px; }
        .action-btn { cursor: pointer; border: none; background: none; font-size: 18px; transition: 0.2s; padding: 5px; }
        .dl-btn { color: var(--accent); opacity: 0.8; }
        .del-btn { color: #f85149; opacity: 0.6; }
        .action-btn:hover { opacity: 1; transform: scale(1.15); }

        /* Loading Spinner */
        .swal2-loader { border-color: var(--accent) transparent var(--accent) transparent !important; }
    </style>
    <!-- SweetAlert2 for Nice Loading and Alerts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="wrapper">
    <div class="brand">
        <h1><i class="fa-solid fa-cloud-bolt"></i> ToDO-List-Drive</h1>
        <p>Your Personal Cloud Hub • Intelligent Hybrid Sync Enabled</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><i class="fa-solid fa-database"></i><h3 id="totalCount">0</h3><span>Total Files</span></div>
        <div class="stat-card"><i class="fa-solid fa-image"></i><h3 id="imgCount">0</h3><span>Images</span></div>
        <div class="stat-card"><i class="fa-solid fa-note-sticky"></i><h3 id="noteCount">0</h3><span>Notes</span></div>
        <div class="stat-card"><i class="fa-solid fa-hard-drive"></i><h3>Active</h3><span>Local Sync</span></div>
    </div>

    <div class="main-grid">
        <div class="upload-panel" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-circle-arrow-up"></i>
            <h3>Upload Image</h3>
            <p style="font-size: 12px; color: #8b949e;">Personal Cloud Storage</p>
            <input type="file" id="fileInput" accept="image/*">
            <div class="progress-box" id="progBox">
                <div class="progress-fill" id="progFill"></div>
            </div>
        </div>

        <div class="note-panel">
            <h3 style="font-size: 15px; color: #fff;"><i class="fa-solid fa-file-pen"></i> Quick Note / Text</h3>
            <textarea id="noteInput" placeholder="Write your note or paste content here..."></textarea>
            <button id="saveNoteBtn"><i class="fa-solid fa-cloud-arrow-up"></i> Save to Cloud</button>
        </div>
    </div>

    <div class="explorer-header"><i class="fa-regular fa-folder-open"></i> Root / My_Files / Smart_Local_Sync</div>
    <ul class="asset-list" id="assetList"></ul>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // --- YOUR FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDJvkQN0UsGoPHRWwXtMFfMmxoJ68Y1Aow",
        authDomain: "cloud-based-to-do-list-a-b3a27.firebaseapp.com",
        databaseURL: "https://cloud-based-to-do-list-a-b3a27-default-rtdb.firebaseio.com",
        projectId: "cloud-based-to-do-list-a-b3a27",
        storageBucket: "cloud-based-to-do-list-a-b3a27.firebasestorage.app",
        messagingSenderId: "1088974062091",
        appId: "1:1088974062091:web:1ff7f505f17a82f28d3d0e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, "hybrid_assets");
    
    // --- YOUR IMGBB API KEY ---
    const imgKey = "efed5fcd928da9c824a03015af6ec43d";

    // Toast Notification Config
    const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3000,
        background: '#161b22',
        color: '#fff'
    });

    // --- Image Upload Logic ---
    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const progBox = document.getElementById('progBox');
        const progFill = document.getElementById('progFill');
        progBox.style.display = 'block';
        progFill.style.width = '40%';

        const formData = new FormData();
        formData.append("image", file);

        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${imgKey}`, { method: "POST", body: formData });
            const result = await response.json();
            if (result.success) {
                progFill.style.width = '100%';
                push(dbRef, {
                    type: "image",
                    name: file.name,
                    url: result.data.url,
                    thumb: result.data.thumb.url,
                    time: new Date().toLocaleString()
                });
                Toast.fire({ icon: 'success', title: 'Image Uploaded!' });
                setTimeout(() => { progBox.style.display = 'none'; progFill.style.width = '0%'; }, 1000);
            } else {
                Swal.fire({ icon: 'error', title: 'Oops...', text: 'ImgBB Upload Failed!', background: '#161b22', color: '#fff' });
                progBox.style.display = 'none';
            }
        } catch (err) { 
            Swal.fire({ icon: 'error', title: 'Error', text: 'Network Error!', background: '#161b22', color: '#fff' });
            progBox.style.display = 'none';
        }
    });

    // --- Text Note Logic ---
    document.getElementById('saveNoteBtn').addEventListener('click', () => {
        const noteText = document.getElementById('noteInput').value;
        if (!noteText.trim()) return Swal.fire({ icon: 'warning', text: 'Please write something first!', background: '#161b22', color: '#fff' });
        push(dbRef, { type: "note", content: noteText, time: new Date().toLocaleString() });
        Toast.fire({ icon: 'success', title: 'Note Saved!' });
        document.getElementById('noteInput').value = "";
    });

    // --- Sync & Download Logic ---
    onValue(dbRef, (snapshot) => {
        const list = document.getElementById("assetList");
        list.innerHTML = "";
        let imgTotal = 0, noteTotal = 0;

        snapshot.forEach(child => {
            const data = child.val();
            const li = document.createElement("li");
            li.className = "asset-item";
            const isImage = data.type === "image";
            if(isImage) imgTotal++; else noteTotal++;

            // Encoding content to safely pass to onclick
            const safeContent = !isImage ? btoa(unescape(encodeURIComponent(data.content))) : '';

            li.innerHTML = `
                <div class="asset-info">
                    ${isImage ? `<img src="${data.thumb}" alt="thumb">` : `<i class="fa-solid fa-file-lines"></i>`}
                    <div class="asset-content">
                        <span>${isImage ? data.name : data.content}</span>
                        <small>${isImage ? 'Image' : 'Text Note'} • ${data.time}</small>
                    </div>
                </div>
                <div class="actions">
                    <button class="action-btn dl-btn" onclick="downloadAsset('${isImage ? data.url : ''}', '${isImage ? data.name : ''}', ${!isImage}, '${safeContent}')" title="Download to Laptop">
                        <i class="fa-solid fa-circle-down"></i>
                    </button>
                    <button class="action-btn del-btn" onclick="deleteItem('${child.key}')" title="Delete from Cloud">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>`;
            list.prepend(li); // Show new files first
        });
        document.getElementById("totalCount").innerText = imgTotal + noteTotal;
        document.getElementById("imgCount").innerText = imgTotal;
        document.getElementById("noteCount").innerText = noteTotal;
    });

    // --- FULL AND FINAL SMART DOWNLOAD FUNCTION ---
    window.downloadAsset = async (url, filename, isText, encodedContent) => {
        Swal.fire({
            title: 'Downloading...',
            html: 'Preparing your file for local save',
            allowOutsideClick: false,
            background: '#161b22',
            color: '#fff',
            didOpen: () => { Swal.showLoading(); }
        });

        try {
            if (isText) {
                // Decode content back
                const content = decodeURIComponent(escape(atob(encodedContent)));
                const blob = new Blob([content], { type: "text/plain" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `CloudNote_${Date.now()}.txt`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } else {
                // Force Download Image using Blob
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = blobUrl;
                link.download = filename || `CloudImage_${Date.now()}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(blobUrl);
            }
            Swal.close();
            Toast.fire({ icon: 'success', title: 'File saved to laptop!' });
        } catch (e) {
            Swal.close();
            // Backup for Images if CORS fails
            if (!isText) {
                window.open(url, '_blank');
                Toast.fire({ icon: 'info', title: 'Opened in new tab. Right-click to save.' });
            } else {
                Swal.fire({ icon: 'error', title: 'Download Failed', background: '#161b22', color: '#fff' });
            }
        }
    };

    // Delete Logic with Confirmation
    window.deleteItem = (id) => { 
        Swal.fire({
            title: 'Are you sure?',
            text: "This will remove file from cloud storage!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'Yes, delete it!',
            background: '#161b22',
            color: '#fff'
        }).then((result) => {
            if (result.isConfirmed) {
                remove(ref(db, "hybrid_assets/" + id));
                Toast.fire({ icon: 'success', title: 'Deleted from cloud.' });
            }
        });
    };
</script>

</body>
</html>
